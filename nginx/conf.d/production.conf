# Block raw IP access globally to prevent automated vulnerability scanners
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444; # Connection closed without response
}

# Production Reverse Proxy
server {
    listen 80;
    listen [::]:80;
    
    # Dynamic subdomain routing for SaaS Tenants (e.g. tech.fastpos.com, pharma.fastpos.com)
    # Replaces 'yourdomain.com' with the actual production root domain
    server_name ~^(?<subdomain>[a-z0-9-]+)\.yourdomain\.com$ yourdomain.com;

    # Enterprise Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # API Routing -> Backend (Laravel Container bound to 127.0.0.1:8000)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout handling for heavy payload queries
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Frontend Routing -> Next.js SSR (Frontend Container bound to 127.0.0.1:3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Deny access to hidden files (.env, .git, etc)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
